<!DOCTYPE html>
<html lang="id" data-theme="dark">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0" />
<meta name="robots" content="noindex,nofollow" />
<meta name="theme-color" content="#0d1310" />
<title>Admin · Warung Cak Moer</title>
<link rel="icon" type="image/png" href="favicon.png" />
<link rel="manifest" href="admin.webmanifest" />
<link rel="apple-touch-icon" href="admin-apple-touch.png" />
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,300;0,400;0,500;0,600;1,400;1,500&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/tabler-icons/3.11.0/tabler-icons.min.css" />
<style>

:root{
  --radius:9px; --radius-sm:4px; --maxw:1180px;
  --serif:'Fraunces',Georgia,'Times New Roman',serif;
  --sans:'Plus Jakarta Sans',system-ui,sans-serif;
  --on-gold:#10130f;
  --wa:#1e8c52;
}
/* ===== TEMA GELAP (dramatis) ===== */
[data-theme="dark"]{
  --bg:#0d1310; --bg-soft:#101713; --surface:#141b16; --surface-2:#1b231d;
  --text:#ece4d3; --text-soft:#9a958a; --text-faint:#6f6a60;
  --line:rgba(236,228,211,.12); --line-gold:rgba(201,162,74,.30);
  --gold:#c9a24a; --gold-ink:#d8b766; --gold-soft:#b8923f;
  --emerald:#11201a; --emerald-deep:#0c1813; --ivory:#ece4d3;
  --brand:#1f3d2e; --brand-strong:#11201a; --cream:#ece4d3; --on-brand:#0d1310; --accent:#c9a24a;
}
/* ===== TEMA TERANG (gading klasik) ===== */
[data-theme="light"]{
  --bg:#f4efe3; --bg-soft:#fbf8f0; --surface:#ffffff; --surface-2:#efe8d8;
  --text:#23302a; --text-soft:#6a6256; --text-faint:#9a9080;
  --line:rgba(35,48,42,.14); --line-gold:rgba(150,118,40,.34);
  --gold:#9c7a2b; --gold-ink:#876722; --gold-soft:#b3922f;
  --emerald:#11201a; --emerald-deep:#0c1813; --ivory:#f3ecdc;
  --brand:#1f3d2e; --brand-strong:#11201a; --cream:#f3ecdc; --on-brand:#0d1310; --accent:#9c7a2b;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html{scroll-behavior:smooth}
body{
  font-family:var(--sans); background:var(--bg); color:var(--text);
  font-size:16px; line-height:1.7; -webkit-font-smoothing:antialiased;
  padding-bottom:76px; transition:background .4s ease,color .4s ease;
}
h1,h2,h3,h4{font-family:var(--serif); font-weight:500; line-height:1.2}
img{display:block;max-width:100%}
a{color:inherit;text-decoration:none}
.wrap{max-width:var(--maxw);margin:0 auto;padding:0 22px}
:focus-visible{outline:2px solid var(--gold);outline-offset:3px}
#top,#about,#menu,#kontak{scroll-margin-top:80px}
.eyebrow,.sec-tag,.chip,.tag-cat,.nav-links a,.bn,.btn,.copy{font-family:var(--sans)}

/* ===== HEADER ===== */
header{position:sticky;top:0;z-index:40;
  background:color-mix(in srgb,var(--bg) 86%,transparent);
  backdrop-filter:saturate(140%) blur(14px);border-bottom:1px solid var(--line)}
.nav{display:flex;align-items:center;justify-content:space-between;height:68px}
.logo-wrap{position:relative}
.logo{background:none;border:none;cursor:pointer;color:inherit;display:flex;align-items:center;gap:13px;padding:5px 8px;border-radius:var(--radius-sm);transition:.2s}
.logo:hover{background:var(--surface-2)}
.logo .mark{width:40px;height:40px;border-radius:50%;border:1px solid var(--gold);
  display:grid;place-items:center;font-family:var(--serif);font-weight:500;font-size:16px;color:var(--gold);flex:none}
.logo .name{font-family:var(--serif);font-size:19px;letter-spacing:3px;line-height:1.05;color:var(--text)}
.logo .name small{display:block;font-family:var(--sans);font-size:9px;font-weight:500;letter-spacing:.26em;
  color:var(--gold);text-transform:uppercase;margin-top:2px}
.logo-caret{font-size:15px;color:var(--text-soft);transition:transform .25s}
.logo[aria-expanded="true"] .logo-caret{transform:rotate(180deg)}
.nav-links{display:none;align-items:center;gap:34px}
@media(min-width:820px){.nav-links{display:flex}}
.nav-links a{font-size:12px;font-weight:500;letter-spacing:.18em;text-transform:uppercase;color:var(--text-soft);transition:color .2s;position:relative;padding:4px 0}
.nav-links a:hover{color:var(--gold)}
.nav-tools{display:flex;align-items:center;gap:11px}
.icon-btn{width:44px;height:44px;border-radius:50%;border:1px solid var(--line);background:transparent;
  color:var(--text);display:grid;place-items:center;cursor:pointer;font-size:19px;transition:.2s}
.icon-btn:hover{border-color:var(--gold);color:var(--gold)}
.icon-btn:active{transform:scale(.94)}
.cart-btn{position:relative}
.cart-count{position:absolute;top:-5px;right:-5px;min-width:19px;height:19px;padding:0 5px;border-radius:10px;
  background:var(--gold);color:var(--on-gold);font-size:11px;font-weight:700;display:grid;place-items:center;
  font-family:var(--sans);transform:scale(0);transition:transform .25s cubic-bezier(.34,1.56,.64,1)}
.cart-count.show{transform:scale(1)}

/* ===== MENU CEPAT (dropdown logo) ===== */
.brandmenu{position:absolute;top:calc(100% + 10px);left:0;min-width:226px;background:var(--surface);
  border:1px solid var(--line-gold);border-radius:var(--radius);padding:7px;z-index:55;
  opacity:0;visibility:hidden;transform:translateY(-6px);transition:.18s ease;
  box-shadow:0 24px 60px -22px rgba(0,0,0,.6)}
.brandmenu.open{opacity:1;visibility:visible;transform:none}
.bm-item{display:flex;align-items:center;gap:13px;width:100%;text-align:left;background:none;border:none;
  cursor:pointer;font-family:var(--sans);font-size:14px;color:var(--text);padding:12px 13px;border-radius:var(--radius-sm);transition:.14s;text-decoration:none}
.bm-item:hover{background:var(--surface-2);color:var(--gold)}
.bm-item i{font-size:18px;color:var(--gold);width:22px;flex:none;text-align:center}
.bm-div{height:1px;background:var(--line);margin:6px 8px}
.bm-admin,.bm-admin i{color:var(--text-faint)}

/* ===== HERO ===== */
.hero{position:relative;overflow:hidden;background:var(--emerald);color:var(--ivory);
  border-bottom:1px solid var(--line-gold)}
.hero::before{content:"";position:absolute;inset:0;
  background:radial-gradient(130% 90% at 50% 0%,rgba(201,162,74,.10),transparent 60%);pointer-events:none}
.hero-in{position:relative;z-index:2;max-width:var(--maxw);margin:0 auto;padding:88px 22px 96px;text-align:center}
.eyebrow{display:inline-block;font-size:11px;font-weight:600;letter-spacing:.34em;text-transform:uppercase;
  color:var(--gold);margin-bottom:26px}
.hero h1{font-size:clamp(40px,9vw,76px);font-weight:400;letter-spacing:.01em;max-width:16ch;margin:0 auto 8px;color:var(--ivory)}
.hero h1 em{font-style:italic;color:var(--gold-ink)}
.hero .rule{width:48px;height:1px;background:var(--gold);margin:24px auto}
.hero p{font-size:clamp(15px,4vw,18px);max-width:48ch;margin:0 auto 34px;color:rgba(236,228,211,.78);line-height:1.7}
.hero-cta{display:flex;gap:14px;flex-wrap:wrap;justify-content:center}

/* ===== TOMBOL ===== */
.btn{display:inline-flex;align-items:center;gap:9px;font-family:var(--sans);font-size:12px;font-weight:600;
  letter-spacing:.16em;text-transform:uppercase;padding:15px 28px;border-radius:var(--radius-sm);
  cursor:pointer;border:1px solid transparent;transition:.22s}
.btn:active{transform:scale(.98)}
.btn-primary{background:var(--gold);color:var(--on-gold);border-color:var(--gold)}
.btn-primary:hover{background:transparent;color:var(--gold)}
.btn-ghost{background:transparent;border-color:rgba(236,228,211,.4);color:var(--ivory)}
.btn-ghost:hover{border-color:var(--gold);color:var(--gold)}

/* ===== SECTION ===== */
section{padding:74px 0}
.sec-head{margin-bottom:40px;text-align:center}
.sec-tag{font-size:11px;font-weight:600;letter-spacing:.3em;text-transform:uppercase;color:var(--gold)}
.sec-head h2{font-size:clamp(28px,6vw,44px);font-weight:400;margin-top:12px;color:var(--text)}
.sec-head h2::after{content:"";display:block;width:42px;height:1px;background:var(--gold);margin:18px auto 0}

/* ===== TENTANG ===== */
.about{background:var(--bg-soft);border-top:1px solid var(--line);border-bottom:1px solid var(--line)}
.about-grid{display:grid;gap:38px}
@media(min-width:860px){.about-grid{grid-template-columns:1.05fr .95fr;align-items:center}}
.about .sec-head{text-align:left}
.about .sec-head h2::after{margin:18px 0 0}
.about p{color:var(--text-soft);margin-bottom:18px;font-size:16px;line-height:1.8}
.about-card{background:var(--surface);border:1px solid var(--line-gold);border-radius:var(--radius);padding:34px}
.about-stats{display:grid;grid-template-columns:repeat(2,1fr);gap:26px}
.stat .n{font-family:var(--serif);font-size:38px;font-weight:400;color:var(--gold)}
.stat .l{font-size:12px;letter-spacing:.12em;text-transform:uppercase;color:var(--text-soft);margin-top:4px}

/* ===== MENU BAR ===== */
.menu-bar{display:flex;flex-direction:column;gap:13px;margin-bottom:22px;align-items:center}
.search{position:relative;width:100%;max-width:440px}
.search i{position:absolute;left:16px;top:50%;transform:translateY(-50%);color:var(--text-soft);font-size:18px}
.search input{width:100%;height:48px;padding:0 18px 0 44px;border-radius:var(--radius-sm);border:1px solid var(--line);
  background:var(--surface);color:var(--text);font-family:var(--sans);font-size:15px;outline:none;transition:.2s}
.search input::placeholder{color:var(--text-faint)}
.search input:focus{border-color:var(--gold)}
.chips{display:flex;gap:10px;overflow-x:auto;padding-bottom:4px;scrollbar-width:none;justify-content:center;flex-wrap:wrap}
.chips::-webkit-scrollbar{display:none}
.chip{flex:none;font-family:var(--sans);font-size:11px;font-weight:600;letter-spacing:.14em;text-transform:uppercase;
  padding:11px 22px;border-radius:var(--radius-sm);border:1px solid var(--line);background:transparent;color:var(--text-soft);cursor:pointer;transition:.2s;white-space:nowrap}
.chip:hover{border-color:var(--gold);color:var(--gold)}
.chip.active{background:var(--gold);color:var(--on-gold);border-color:var(--gold)}

/* ===== KARTU MENU ===== */
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:18px}
@media(min-width:560px){.grid{grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:26px}}
.card{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);overflow:hidden;
  display:flex;flex-direction:column;opacity:0;transform:translateY(22px);
  transition:opacity .6s cubic-bezier(.2,.7,.2,1) var(--d,0s),transform .6s cubic-bezier(.2,.7,.2,1) var(--d,0s),border-color .3s,box-shadow .3s}
.card.in{opacity:1;transform:none}
.card:hover{border-color:var(--line-gold);box-shadow:0 22px 46px -28px rgba(0,0,0,.55)}
.thumb{position:relative;aspect-ratio:4/3;background:var(--surface-2);overflow:hidden}
.thumb img,.thumb svg{width:100%;height:100%;object-fit:cover;display:block;transition:transform .5s,filter .3s}
.card:hover .thumb img,.card:hover .thumb svg{transform:scale(1.05)}
.tag-cat{position:absolute;top:11px;left:11px;font-size:9px;font-weight:600;letter-spacing:.16em;text-transform:uppercase;
  padding:5px 11px;border-radius:2px;background:rgba(13,19,16,.66);color:var(--ivory);backdrop-filter:blur(3px)}
.sold-badge{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
  background:rgba(13,19,16,.78);color:var(--gold);font-family:var(--serif);font-size:15px;letter-spacing:.16em;text-transform:uppercase;
  padding:8px 20px;border:1px solid var(--gold);border-radius:2px}
.card.is-sold .thumb img,.card.is-sold .thumb svg{filter:grayscale(.9) brightness(.7)}
.card-body{padding:16px 16px 17px;display:flex;flex-direction:column;gap:5px;flex:1}
.card-body h3{font-family:var(--serif);font-size:18px;font-weight:500;letter-spacing:.01em}
.card-body .desc{font-size:12.5px;color:var(--text-soft);line-height:1.5;font-style:italic;flex:1}
.price-row{display:flex;align-items:center;justify-content:space-between;margin-top:12px;padding-top:13px;border-top:1px solid var(--line)}
.price{font-family:var(--serif);font-weight:500;color:var(--gold);font-size:17px}
.add{width:42px;height:42px;border-radius:50%;border:1px solid var(--gold);background:transparent;color:var(--gold);
  font-size:20px;cursor:pointer;display:grid;place-items:center;transition:.2s}
.add:hover{background:var(--gold);color:var(--on-gold)}
.add:active{transform:scale(.88)}
.add.add-off{border-color:var(--line);color:var(--text-faint);cursor:not-allowed}
.add.add-off:hover{background:transparent;color:var(--text-faint)}
.empty-msg{grid-column:1/-1;text-align:center;color:var(--text-soft);padding:46px 0;font-style:italic}

/* ===== FOOTER ===== */
footer{background:var(--emerald);color:rgba(236,228,211,.8);padding:64px 0 44px;border-top:1px solid var(--line-gold)}
.foot-grid{display:grid;gap:34px}
@media(min-width:680px){.foot-grid{grid-template-columns:1.5fr 1fr 1fr}}
footer h4{font-family:var(--serif);color:var(--ivory);font-size:19px;font-weight:500;margin-bottom:15px;letter-spacing:.02em}
footer p,footer a{font-size:14px;line-height:1.95}
footer a:hover{color:var(--gold)}
.foot-row{display:flex;align-items:center;gap:10px;margin-bottom:2px}
.foot-row i{color:var(--gold);font-size:17px;width:20px;flex:none}
.socials{display:flex;gap:11px;margin-top:8px}
.socials a{width:44px;height:44px;border-radius:50%;border:1px solid rgba(236,228,211,.24);
  display:grid;place-items:center;font-size:18px;transition:.2s}
.socials a:hover{background:var(--gold);color:var(--on-gold);border-color:var(--gold)}
.copy{border-top:1px solid rgba(236,228,211,.14);margin-top:40px;padding-top:26px;text-align:center;
  font-size:11px;letter-spacing:.1em;color:rgba(236,228,211,.55)}

/* ===== BOTTOM NAV ===== */
.bottomnav{position:fixed;left:0;right:0;bottom:0;z-index:45;background:color-mix(in srgb,var(--bg) 92%,transparent);
  backdrop-filter:blur(14px);border-top:1px solid var(--line);display:flex;justify-content:space-around;
  padding:9px 0 calc(9px + env(safe-area-inset-bottom))}
.bn{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;background:none;border:none;
  color:var(--text-soft);font-family:var(--sans);font-size:9px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;cursor:pointer;position:relative;padding:4px}
.bn i{font-size:22px}
.bn.active{color:var(--gold)}
.bn .bdg{position:absolute;top:0;right:50%;transform:translateX(16px);min-width:16px;height:16px;padding:0 4px;
  border-radius:9px;background:var(--gold);color:var(--on-gold);font-size:10px;font-weight:700;display:none;place-items:center}
.bn .bdg.show{display:grid}
@media(min-width:820px){.bottomnav{display:none}body{padding-bottom:0}}

/* ===== KERANJANG ===== */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.62);z-index:96;opacity:0;visibility:hidden;transition:.3s}
.overlay.open{opacity:1;visibility:visible}
.drawer{position:fixed;top:0;right:0;height:100%;height:100dvh;width:min(430px,100%);background:var(--bg);z-index:97;
  display:flex;flex-direction:column;transform:translateX(100%);transition:transform .38s cubic-bezier(.4,0,.2,1);border-left:1px solid var(--line-gold)}
.drawer.open{transform:none}
.drawer-head{display:flex;align-items:center;justify-content:space-between;padding:20px 20px;border-bottom:1px solid var(--line)}
.drawer-head h3{font-family:var(--serif);font-size:22px;font-weight:500}
.drawer-scroll{flex:1;min-height:0;overflow-y:auto;-webkit-overflow-scrolling:touch}
.drawer-body{padding:8px 20px}
.checkout-fields{padding:8px 20px 16px;border-top:1px solid var(--line)}
.ci{display:flex;gap:14px;padding:15px 0;border-bottom:1px solid var(--line)}
.ci-i{width:60px;height:60px;border-radius:var(--radius-sm);overflow:hidden;background:var(--surface-2);flex:none;display:grid;place-items:center;color:var(--gold)}
.ci-info{flex:1;min-width:0}
.ci-info h4{font-family:var(--serif);font-size:16px;font-weight:500}
.ci-info .p{font-size:13px;color:var(--text-soft)}
.qty{display:flex;align-items:center;gap:11px;margin-top:8px}
.qty button{width:34px;height:34px;border-radius:50%;border:1px solid var(--line);background:transparent;
  color:var(--text);font-size:17px;cursor:pointer;display:grid;place-items:center;transition:.15s}
.qty button:hover{border-color:var(--gold);color:var(--gold)}
.qty button:active{transform:scale(.9)}
.qty span{font-weight:600;min-width:18px;text-align:center}
.cart-empty{text-align:center;color:var(--text-soft);padding:64px 20px;font-style:italic}
.cart-empty i{font-size:44px;opacity:.4;display:block;margin-bottom:14px;color:var(--gold)}
.drawer-foot{padding:14px 20px;padding-bottom:calc(14px + env(safe-area-inset-bottom));border-top:1px solid var(--line);background:var(--surface)}
.field{margin-bottom:13px}
.field label{display:block;font-size:11px;font-weight:600;letter-spacing:.12em;text-transform:uppercase;margin-bottom:7px;color:var(--text-soft)}
.field input,.field textarea,.admin select{width:100%;padding:13px 15px;border-radius:var(--radius-sm);border:1px solid var(--line);
  background:var(--bg);color:var(--text);font-family:var(--sans);font-size:16px;outline:none;transition:.2s}
.field input::placeholder,.field textarea::placeholder{color:var(--text-faint)}
.field input:focus,.field textarea:focus,.admin select:focus{border-color:var(--gold)}
.field textarea{resize:vertical;min-height:58px}
.total-row{display:flex;align-items:center;justify-content:space-between;margin:8px 0 16px}
.total-row .t-l{font-size:12px;letter-spacing:.12em;text-transform:uppercase;color:var(--text-soft)}
.total-row .t-v{font-family:var(--serif);font-size:26px;font-weight:500;color:var(--gold)}
.btn-wa{width:100%;justify-content:center;background:var(--wa);color:#fff;border-color:var(--wa)}
.btn-wa:hover{filter:brightness(1.08)}
.btn-wa:disabled{opacity:.45;cursor:not-allowed}
.seg{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.seg-btn{display:flex;align-items:center;justify-content:center;gap:7px;padding:13px 8px;border:1px solid var(--line);
  background:var(--bg);color:var(--text-soft);border-radius:var(--radius-sm);cursor:pointer;font-family:var(--sans);
  font-size:13px;font-weight:600;transition:.18s}
.seg-btn i{font-size:18px}
.seg-btn:hover{border-color:var(--gold);color:var(--gold)}
.seg-btn.active{border-color:var(--gold);color:var(--on-gold);background:var(--gold)}
.zona-opts{display:flex;flex-direction:column;gap:8px}
.zona-opt{display:flex;align-items:center;justify-content:space-between;gap:10px;width:100%;text-align:left;
  padding:13px 14px;border:1px solid var(--line);background:var(--bg);border-radius:var(--radius-sm);cursor:pointer;
  font-family:var(--sans);color:var(--text);transition:.18s}
.zona-opt:hover{border-color:var(--gold)}
.zona-opt.active{border-color:var(--gold);box-shadow:inset 0 0 0 1px var(--gold)}
.zo-t{display:block;font-size:13.5px;font-weight:600}
.zo-s{display:block;font-size:11.5px;color:var(--text-soft);margin-top:1px}
.zo-p{font-family:var(--serif);font-size:15px;color:var(--gold);white-space:nowrap;flex:none}
.sub-row{display:flex;justify-content:space-between;font-size:13px;color:var(--text-soft);margin:3px 0}
.sub-row span:last-child{color:var(--text)}

/* ===== TOAST ===== */
.toast{position:fixed;left:50%;bottom:94px;transform:translate(-50%,20px);z-index:99;background:var(--emerald);
  color:var(--ivory);padding:13px 22px;border:1px solid var(--line-gold);border-radius:var(--radius-sm);font-size:14px;font-weight:500;
  box-shadow:0 16px 40px -16px rgba(0,0,0,.6);opacity:0;visibility:hidden;transition:.3s;display:flex;align-items:center;gap:9px}
.toast.show{opacity:1;visibility:visible;transform:translate(-50%,0)}
.toast i{color:var(--gold)}

/* ===== PANEL ADMIN & KATERING (struktur bersama) ===== */
.admin-mask,.cater-mask{position:fixed;inset:0;background:rgba(0,0,0,.62);z-index:80;display:none}
.admin-mask.open,.cater-mask.open{display:block}
.admin,.cater{position:fixed;z-index:85;inset:0;background:var(--bg);display:flex;flex-direction:column;overflow:hidden;
  transform:translateY(8px);opacity:0;pointer-events:none;transition:.28s}
.admin.open,.cater.open{transform:none;opacity:1;pointer-events:auto}
@media(min-width:680px){.admin,.cater{inset:26px;border:1px solid var(--line-gold);border-radius:var(--radius);max-width:720px;margin:0 auto;max-height:calc(100% - 52px);box-shadow:0 34px 80px -22px rgba(0,0,0,.7)}}

   <g fill="#d9a441"><circle cx="40" cy="50" r="1.3"/><circle cx="52" cy="48" r="1.3"/><circle cx="60" cy="52" r="1.3"/><circle cx="46" cy="53" r="1.3"/></g>
   <g fill="#5aa05a"><circle cx="44" cy="49" r="1.4"/><circle cx="58" cy="50" r="1.4"/></g>
   <ellipse cx="58" cy="46" rx="9" ry="6" fill="#fff7e6"/>
   <circle cx="58" cy="46" r="3.4" fill="#f4a93b"/>
   <path d="M36 45 q6 -2 9 1" stroke="#c8442f" stroke-width="2.4" fill="none" stroke-linecap="round"/>
   ${STEAM(50)}`;
}
function artSoup(a){
  let tops = `<circle cx="42" cy="40" r="6" fill="${a.balls}"/><circle cx="56" cy="41" r="6.5" fill="${a.balls}"/><circle cx="50" cy="36" r="5" fill="${a.balls}"/>`;
  if(a.soto) tops += `<rect x="40" y="39" width="20" height="2.6" rx="1.3" fill="#f7e7a6"/><circle cx="46" cy="34" r="1.6" fill="#5aa05a"/><circle cx="55" cy="35" r="1.6" fill="#5aa05a"/>`;
  if(a.seblak) tops = `<path d="M40 38 q5 -4 10 0 q5 4 10 0" stroke="#7a3b22" stroke-width="2" fill="none"/><circle cx="44" cy="40" r="3" fill="#e8b04a"/><circle cx="56" cy="40" r="3" fill="#e8b04a"/><circle cx="50" cy="42" r="2.4" fill="#7a3b22"/>`;
  const top = a.flame
    ? `<path d="M50 18 q5 6 0 11 q-5 -5 0 -11Z" fill="#f0892a"/><path d="M50 21 q3 4 0 7 q-3 -3 0 -7Z" fill="#f4c430"/>`
    : STEAM(50);
  return `
   <ellipse cx="50" cy="62" rx="30" ry="5" fill="#000" opacity=".06"/>
   <path d="M22 42 Q22 64 50 64 Q78 64 78 42 Z" fill="#ffffff"/>
   <path d="M22 42 Q22 64 50 64 Q78 64 78 42 Z" fill="none" stroke="#e7ddc8" stroke-width="1"/>
   <ellipse cx="50" cy="42" rx="28" ry="8" fill="${a.broth}"/>
   ${tops}
   <path d="M22 42 Q50 50 78 42" stroke="#ffffff" stroke-width="2" fill="none" opacity=".4"/>
   ${top}`;
}
function artNoodle(a){
  return `
   <ellipse cx="50" cy="62" rx="30" ry="5" fill="#000" opacity=".06"/>
   <path d="M22 42 Q22 64 50 64 Q78 64 78 42 Z" fill="#ffffff"/>
   <path d="M22 42 Q22 64 50 64 Q78 64 78 42 Z" fill="none" stroke="#e7ddc8" stroke-width="1"/>
   <ellipse cx="50" cy="42" rx="28" ry="8" fill="${a.broth}"/>
   <g stroke="#f1d27a" stroke-width="2.2" fill="none" stroke-linecap="round">
     <path d="M34 42 q4 -5 9 -2 q4 3 9 -1 q4 -3 9 1"/>
     <path d="M34 45 q5 -3 10 0 q5 3 10 0 q4 -2 8 0"/>
   </g>
   <g fill="#a9744c"><rect x="45" y="36" width="5" height="5" rx="1.2"/><rect x="53" y="38" width="5" height="5" rx="1.2"/></g>
   <circle cx="40" cy="39" r="1.6" fill="#5aa05a"/><circle cx="62" cy="40" r="1.6" fill="#5aa05a"/>
   ${STEAM(50)}`;
}
function artChicken(a){
  const marks = a.grill
    ? `<g stroke="#3a2012" stroke-width="1.4" opacity=".7"><line x1="40" y1="45" x2="50" y2="41"/><line x1="44" y1="49" x2="54" y2="45"/></g>`
    : `<ellipse cx="46" cy="43" rx="3" ry="2" fill="#ffffff" opacity=".25"/>`;
  return `
   <ellipse cx="50" cy="62" rx="33" ry="5" fill="#000" opacity=".06"/>
   <ellipse cx="50" cy="54" rx="34" ry="11" fill="#ffffff"/>
   <ellipse cx="50" cy="54" rx="34" ry="11" fill="none" stroke="#e7ddc8" stroke-width="1"/>
   <path d="M38 50 Q36 38 50 38 Q62 38 60 50 Q50 56 38 50Z" fill="${a.meat}"/>
   <path d="M38 50 Q36 38 50 38 Q62 38 60 50 Q50 56 38 50Z" fill="none" stroke="${a.meat2}" stroke-width="1.5"/>
   ${marks}
   <rect x="49" y="49" width="9" height="4" rx="2" transform="rotate(18 53 51)" fill="${a.meat2}"/>
   <circle cx="30" cy="52" r="5" fill="#c8442f"/>
   <circle cx="70" cy="51" r="4" fill="#8fc97a"/><circle cx="70" cy="51" r="1.6" fill="#cfe9b8"/>
   <circle cx="64" cy="55" r="3.2" fill="#e0573b"/>
   ${STEAM(52)}`;
}
function artDrink(a){
  const glass  = "M37 24 L63 24 L57 66 Q57 70 53 70 L47 70 Q43 70 43 66 Z";
  const liquid = "M39 31 L61 31 L57 66 Q57 69 53 69 L47 69 Q43 69 43 66 Z";
  const ice  = a.ice  ? `<g fill="#ffffff" opacity=".5"><rect x="44" y="36" width="8" height="8" rx="2" transform="rotate(-12 48 40)"/><rect x="50" y="45" width="7" height="7" rx="2" transform="rotate(15 53 48)"/></g>` : '';
  const foam = a.foam ? `<ellipse cx="50" cy="31" rx="11" ry="3.4" fill="#fffaf0"/>` : '';
  const lemon = a.lemon ? `<circle cx="60" cy="27" r="5.5" fill="#f2e24c"/><path d="M60 27 L60 21.5 M60 27 L64.8 28.7 M60 27 L55.8 30.6" stroke="#d8c020" stroke-width="0.9"/>` : '';
  const straw = `<line x1="55" y1="18" x2="50" y2="40" stroke="${a.straw}" stroke-width="3" stroke-linecap="round"/>`;
  return `
   <ellipse cx="50" cy="73" rx="20" ry="3.5" fill="#000" opacity=".06"/>
   <path d="${glass}" fill="#eef4f1"/>
   <path d="${liquid}" fill="${a.liquid}"/>
   ${ice}${foam}
   <path d="${glass}" fill="none" stroke="#cdd9d2" stroke-width="1.5"/>
   <path d="M41 28 L44 60" stroke="#ffffff" stroke-width="2" opacity=".5" stroke-linecap="round"/>
   ${straw}${lemon}`;
}
function artGeneric(a){
  // ilustrasi cadangan untuk menu baru yg tdk punya gambar khusus
  if(a.drink){
    return artDrink({liquid:'#cdbf9a', straw:'#46b06e'});
  }
  return `
   <ellipse cx="50" cy="62" rx="30" ry="5" fill="#000" opacity=".06"/>
   <path d="M22 42 Q22 64 50 64 Q78 64 78 42 Z" fill="#ffffff"/>
   <path d="M22 42 Q22 64 50 64 Q78 64 78 42 Z" fill="none" stroke="#e7ddc8" stroke-width="1"/>
   <ellipse cx="50" cy="42" rx="28" ry="8" fill="#e6cfa0"/>
   <circle cx="44" cy="40" r="4" fill="#cdae74"/><circle cx="56" cy="41" r="4.5" fill="#cdae74"/>
   ${STEAM(50)}`;
}
function svgFor(m){
  const a = ART[m.id] || {};
  const bg = m.cat === 'minuman' ? '#e7f1ea' : '#f5ecd9';
  let inner = '';
  if(a.type === 'rice')    inner = artRice();
  else if(a.type === 'noodle')  inner = artNoodle(a);
  else if(a.type === 'soup')    inner = artSoup(a);
  else if(a.type === 'chicken') inner = artChicken(a);
  else if(a.type === 'drink')   inner = artDrink(a);
  else inner = artGeneric({drink: m.cat === 'minuman'});
  return `<svg viewBox="0 0 100 80" width="100%" height="100%" preserveAspectRatio="xMidYMid slice" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="${m.nama}"><rect width="100" height="80" fill="${bg}"/>${inner}</svg>`;
}
// Sumber gambar: kalau img berupa URL penuh (foto dari server) pakai apa adanya,
// kalau nama file biasa -> dari folder image/. Kosong -> string kosong (akan fallback ke SVG).
function imgSrc(m){
  if(!m.img) return '';
  return /^https?:\/\//.test(m.img) ? m.img : (CONFIG.imgPath + m.img);
}
// Dipakai saat foto tidak ada / gagal dimuat -> ganti otomatis dgn ilustrasi SVG
function imgFallback(img, id){
  const m = MENU.find(x => x.id === id) || draft.find(x => x.id === id);
  if(m) img.outerHTML = svgFor(m);
}

/* =========================================================
   STATE + util
   ========================================================= */

const rupiah = n => "Rp " + n.toLocaleString("id-ID");
const $ = s => document.querySelector(s);
function esc(s){ return String(s==null?'':s).replace(/[&<>"]/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }
function stars(r){ r=Math.max(0,Math.min(5,parseInt(r,10)||0)); return '<span class="st-on">'+'\u2605'.repeat(r)+'</span><span class="st-off">'+'\u2605'.repeat(5-r)+'</span>'; }

/* ===== state ===== */
let adminKey = null;
let draft = [], editingId = null, editingImg = null;
const DEFAULT_TESTI = [
  { id:1, nama:'Andi Pratama', peran:'Pelanggan setia', rating:5, teks:'Baksonya mantap, kuahnya gurih dan porsinya pas. Sudah langganan dari dulu!' },
  { id:2, nama:'Siti Rahma',   peran:'Warga Arso',       rating:5, teks:'Nasi gorengnya juara, bumbunya berasa rumahan. Pelayanannya ramah banget.' },
  { id:3, nama:'Budi Santoso', peran:'Pelanggan',        rating:5, teks:'Tempatnya nyaman, harga bersahabat. Es jeruknya segar, cocok buat siang hari.' }
];
let TESTI = DEFAULT_TESTI.map(x=>({...x}));
let tDraft = [], tEditingId = null;

/* ===== muat data terkini ===== */
async function loadMenuData(){
  try{ const r=await fetch('/api/menu',{cache:'no-store'}); if(!r.ok)return;
    const j=await r.json();
    if(j && Array.isArray(j.menu) && j.menu.length){ MENU=j.menu.map(x=>({soldOut:false,...x})); if(adminKey){ draft=MENU.map(x=>({...x})); renderAdminList(); } }
  }catch(e){}
}
async function loadTestiData(){
  try{ const r=await fetch('/api/testi',{cache:'no-store'}); if(!r.ok)return;
    const j=await r.json();
    if(j && Array.isArray(j.testi)){ TESTI=j.testi.map(x=>({...x})); if(adminKey){ tDraft=TESTI.map(x=>({...x})); renderTestiList(); } }
  }catch(e){}
}

/* ===== login / navigasi ===== */
function doLogin(){
  const v=$("#adm_pass").value;
  if(!v){ $("#login_msg").textContent="Masukkan password."; return; }
  adminKey=v;
  draft=MENU.map(x=>({...x})); tDraft=TESTI.map(x=>({...x}));
  renderAdminList(); clearForm(); renderTestiList(); clearTestiForm();
  $("#loginView").style.display="none"; $("#dashView").style.display="block"; $("#logoutBtn").style.display="grid";
}
function logout(){
  adminKey=null;
  $("#dashView").style.display="none"; $("#loginView").style.display="block"; $("#logoutBtn").style.display="none";
  $("#adm_pass").value=""; $("#login_msg").textContent="";
}
function showTab(t){
  $("#tabMenu").style.display = t==='menu' ? 'block':'none';
  $("#tabTesti").style.display = t==='testi' ? 'block':'none';
  document.querySelectorAll('.adm-tab').forEach(b=> b.classList.toggle('active', b.dataset.tab===t));
}

/* ===== kelola menu ===== */
function adminMsg(t){ $("#adm_state").textContent = t || ""; }
function renderAdminList(){
  $("#admList").innerHTML = draft.map(m=>`
    <div class="adm-item">
      <div class="adm-thumb">${m.img ? `<img src="${imgSrc(m)}" alt="" onerror="imgFallback(this,${m.id})">` : svgFor(m)}</div>
      <div class="adm-info">
        <h4>${esc(m.nama)}${m.soldOut ? ' · <span style="color:#c0392b">Habis</span>' : ''}</h4>
        <div class="p">${rupiah(m.harga)} · ${m.cat === 'makanan' ? 'Makanan' : 'Minuman'}</div>
      </div>
      <div class="adm-actions">
        <button class="mini ${m.soldOut ? '' : 'on'}" title="${m.soldOut ? 'Tandai tersedia' : 'Tandai habis'}" onclick="toggleSold(${m.id})"><i class="ti ti-${m.soldOut ? 'eye-off' : 'check'}"></i></button>
        <button class="mini" title="Edit" onclick="editItem(${m.id})"><i class="ti ti-pencil"></i></button>
        <button class="mini danger" title="Hapus" onclick="deleteItem(${m.id})"><i class="ti ti-trash"></i></button>
      </div>
    </div>`).join("") || '<div class="save-state">Belum ada menu.</div>';
}
function clearForm(){
  editingId=null; editingImg=null;
  $("#a_nama").value=""; $("#a_harga").value=""; $("#a_desc").value="";
  $("#a_cat").value="makanan"; $("#a_foto").value="";
  $("#adm_form_title").textContent="Tambah menu";
}
function editItem(id){
  const m=draft.find(x=>x.id===id); if(!m) return;
  editingId=id; editingImg=m.img||null;
  $("#a_nama").value=m.nama; $("#a_harga").value=m.harga; $("#a_cat").value=m.cat; $("#a_desc").value=m.desc||""; $("#a_foto").value="";
  $("#adm_form_title").textContent="Edit menu";
  window.scrollTo({top:0,behavior:'smooth'});
  const form=document.querySelector('#tabMenu .adm-form'); if(form){ form.classList.add('flash'); setTimeout(()=>form.classList.remove('flash'),1200); }
  setTimeout(()=>{ const n=$("#a_nama"); if(n) n.focus({preventScroll:true}); },350);
}
function toggleSold(id){ const m=draft.find(x=>x.id===id); if(m){ m.soldOut=!m.soldOut; renderAdminList(); } }
function deleteItem(id){
  const m=draft.find(x=>x.id===id); if(!m) return;
  if(!confirm(`Hapus "${m.nama}" dari daftar?`)) return;
  draft=draft.filter(x=>x.id!==id);
  if(editingId===id) clearForm();
  renderAdminList(); adminMsg("Item dihapus (klik Simpan untuk publikasikan).");
}
async function uploadPhoto(file){
  const dataBase64=await new Promise((res,rej)=>{ const r=new FileReader(); r.onload=()=>res(String(r.result).split(',')[1]); r.onerror=()=>rej(new Error("Gagal membaca file")); r.readAsDataURL(file); });
  const resp=await fetch('/api/upload',{method:'POST',headers:{'Content-Type':'application/json','x-admin-key':adminKey},body:JSON.stringify({filename:file.name,contentType:file.type,dataBase64})});
  if(resp.status===401) throw new Error("Password salah");
  if(!resp.ok){ const e=await resp.json().catch(()=>({})); throw new Error(e.error||("Gagal upload ("+resp.status+")")); }
  const j=await resp.json(); return j.url;
}
async function submitItem(){
  const nama=$("#a_nama").value.trim();
  const harga=parseInt(String($("#a_harga").value).replace(/\D/g,''),10);
  const cat=$("#a_cat").value, desc=$("#a_desc").value.trim(), file=$("#a_foto").files[0];
  if(!nama){ adminMsg("Nama menu wajib diisi."); return; }
  if(!harga && harga!==0){ adminMsg("Harga tidak valid."); return; }
  let img=editingImg;
  try{ if(file){ adminMsg("Mengunggah foto…"); img=await uploadPhoto(file); } }catch(e){ adminMsg(e.message); return; }
  if(editingId){ Object.assign(draft.find(x=>x.id===editingId), {nama,harga,cat,desc,img}); }
  else{ const newId=(draft.reduce((mx,x)=>Math.max(mx,x.id),0)||0)+1; draft.push({id:newId,nama,harga,cat,desc,img,soldOut:false}); }
  clearForm(); renderAdminList(); adminMsg("Tersimpan sementara. Klik Simpan untuk publikasikan.");
}
async function saveAdmin(){
  adminMsg("Menyimpan…");
  try{
    const resp=await fetch('/api/menu',{method:'POST',headers:{'Content-Type':'application/json','x-admin-key':adminKey},body:JSON.stringify({menu:draft})});
    if(resp.status===401){ adminMsg(""); logout(); $("#login_msg").textContent="Password salah, coba lagi."; return; }
    if(!resp.ok){ const e=await resp.json().catch(()=>({})); adminMsg(e.error||"Gagal menyimpan."); return; }
    MENU=draft.map(x=>({...x})); renderAdminList(); adminMsg("Tersimpan & dipublikasikan ✔");
  }catch(e){ adminMsg("Gagal menyimpan: "+e.message); }
}

/* ===== kelola testimoni ===== */
function testiMsg(t){ $("#t_state").textContent = t || ""; }
function setTRate(n){ $("#t_rating").value=n; document.querySelectorAll('#t_rate button').forEach((b,i)=> b.classList.toggle('on', i<n)); }
function clearTestiForm(){ tEditingId=null; $("#t_nama").value=""; $("#t_peran").value=""; $("#t_teks").value=""; setTRate(5); $("#t_form_title").textContent="Tambah testimoni"; }
function renderTestiList(){
  $("#tList").innerHTML = tDraft.map(t=>`
    <div class="adm-item">
      <div class="adm-info">
        <h4>${esc(t.nama)} <span style="color:var(--gold);font-size:13px">${stars(t.rating)}</span></h4>
        <div class="p">${esc((t.teks||'').slice(0,70))}${(t.teks||'').length>70?'…':''}</div>
      </div>
      <div class="adm-actions">
        <button class="mini" title="Edit" onclick="testiEdit(${t.id})"><i class="ti ti-pencil"></i></button>
        <button class="mini danger" title="Hapus" onclick="testiDelete(${t.id})"><i class="ti ti-trash"></i></button>
      </div>
    </div>`).join("") || '<div class="save-state">Belum ada testimoni.</div>';
}
function submitTesti(){
  const nama=$("#t_nama").value.trim(), teks=$("#t_teks").value.trim();
  const peran=$("#t_peran").value.trim(), rating=parseInt($("#t_rating").value,10)||5;
  if(!nama || !teks){ testiMsg("Nama dan teks testimoni wajib diisi."); return; }
  if(tEditingId){ const t=tDraft.find(x=>x.id===tEditingId); if(t){ t.nama=nama; t.teks=teks; t.peran=peran; t.rating=rating; } }
  else { tDraft.push({ id:Date.now(), nama, teks, peran, rating }); }
  renderTestiList(); clearTestiForm(); testiMsg("Tersimpan sementara — klik Simpan & Publikasikan.");
}
function testiEdit(id){
  const t=tDraft.find(x=>x.id===id); if(!t) return;
  tEditingId=id;
  $("#t_nama").value=t.nama; $("#t_peran").value=t.peran||""; $("#t_teks").value=t.teks||"";
  setTRate(t.rating||5); $("#t_form_title").textContent="Edit testimoni";
  window.scrollTo({top:0,behavior:'smooth'});
  const form=document.querySelector('#tabTesti .adm-form'); if(form){ form.classList.add('flash'); setTimeout(()=>form.classList.remove('flash'),1200); }
  setTimeout(()=>{ const n=$("#t_nama"); if(n) n.focus({preventScroll:true}); },350);
}
function testiDelete(id){
  const t=tDraft.find(x=>x.id===id); if(!t) return;
  if(!confirm(`Hapus testimoni dari "${t.nama}"?`)) return;
  tDraft=tDraft.filter(x=>x.id!==id);
  if(tEditingId===id) clearTestiForm();
  renderTestiList(); testiMsg("Dihapus (klik Simpan untuk publikasikan).");
}
async function saveTesti(){
  testiMsg("Menyimpan…");
  try{
    const resp=await fetch('/api/testi',{method:'POST',headers:{'Content-Type':'application/json','x-admin-key':adminKey},body:JSON.stringify({testi:tDraft})});
    if(resp.status===401){ testiMsg(""); logout(); $("#login_msg").textContent="Password salah, coba lagi."; return; }
    if(!resp.ok){ const e=await resp.json().catch(()=>({})); testiMsg(e.error||"Gagal menyimpan."); return; }
    TESTI=tDraft.map(x=>({...x})); renderTestiList(); testiMsg("Tersimpan & dipublikasikan ✔");
  }catch(e){ testiMsg("Gagal menyimpan: "+e.message); }
}

/* ===== init ===== */
showTab('menu');
loadMenuData();
loadTestiData();

</script>
<script>if('serviceWorker' in navigator){window.addEventListener('load',function(){navigator.serviceWorker.register('sw.js').catch(function(){});});}</script>
</body>
</html>
